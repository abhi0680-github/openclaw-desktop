version: "3.7"

services:

  openclaw-desktop:
    build:
      context: .
      args:
        OPENCLAW_VERSION: latest

    container_name: openclaw-desktop

    restart: unless-stopped

    env_file:
      - .env

    environment:
      DISPLAY_WIDTH: ${DISPLAY_WIDTH}
      DISPLAY_HEIGHT: ${DISPLAY_HEIGHT}
      DISPLAY_DEPTH: ${DISPLAY_DEPTH}

    ports:
      - "18789:18789"
      - "5900:5900"
      - "6080:6080"

    volumes:
      - ./config:/config
      - ./logs:/logs
      - ./workspace:/workspace
      - ./openclaw-home:/home/node/.openclaw

